# Сборка Yanak Admin (Electron + встроенный backoffice) на машине GitHub — без долгой локальной сборки на слабом ПК.
# Артефакты: NSIS Setup и portable .exe из apps/admin-desktop/dist-pack/
name: Desktop Admin (Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build desktop (backoffice standalone + electron-builder)
        run: npm run desktop:dist
        env:
          # Для electron-builder при необходимости скачивания с GitHub
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: yanak-admin-windows-${{ github.run_number }}-${{ github.sha }}
          path: apps/admin-desktop/dist-pack/*.exe
          if-no-files-found: error
