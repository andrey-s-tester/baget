# Пример для Linux-сервера с certbot (Let's Encrypt).
# DNS: A/AAAA bagetnaya-yanak.ru, api.bagetnaya-yanak.ru, admin.bagetnaya-yanak.ru → IP сервера.
# Docker на хосте: витрина :3000, админка :3001, API :4001 (см. docker-compose.yml).
#
# Подключение: include в http {} или скопировать в sites-enabled после замены путей к сертификатам.

upstream yanak_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream yanak_admin {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream yanak_api {
    server 127.0.0.1:4001;
    keepalive 32;
}

# HTTP → редирект на HTTPS (после получения сертификатов)
server {
    listen 80;
    listen [::]:80;
    server_name bagetnaya-yanak.ru www.bagetnaya-yanak.ru;
    return 301 https://bagetnaya-yanak.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.bagetnaya-yanak.ru;
    return 301 https://api.bagetnaya-yanak.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.bagetnaya-yanak.ru;
    return 301 https://admin.bagetnaya-yanak.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bagetnaya-yanak.ru www.bagetnaya-yanak.ru;

    ssl_certificate     /etc/letsencrypt/live/bagetnaya-yanak.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bagetnaya-yanak.ru/privkey.pem;

    location / {
        proxy_pass http://yanak_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.bagetnaya-yanak.ru;

    ssl_certificate     /etc/letsencrypt/live/api.bagetnaya-yanak.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bagetnaya-yanak.ru/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://yanak_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.bagetnaya-yanak.ru;

    ssl_certificate     /etc/letsencrypt/live/admin.bagetnaya-yanak.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.bagetnaya-yanak.ru/privkey.pem;

    location / {
        proxy_pass http://yanak_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
